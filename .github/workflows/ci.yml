name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  safety-demo:
    name: Safety evidence demo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      # actions/setup-python exposes the selected 3.12 runtime as `python`.
      # The current locked agent-guard release recognizes this form in workflow evidence.
      - name: Install locked dependencies
        run: python -m pip install --require-hashes -r requirements/agent-safety-tools.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Check guard workflow wiring
        run: python -m agent_guard.cli surface inventory --root . --context-policy .agent-guard/context-policy.yaml --schema-version v2 --json > /tmp/agent-surface-inventory.json

      - name: Run end-to-end demo
        run: bash scripts/run_demo.sh
