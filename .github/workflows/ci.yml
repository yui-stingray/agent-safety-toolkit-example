name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  safety-demo:
    name: Safety toolkit demo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install locked dependencies
        run: python -m pip install --require-hashes -r requirements/agent-safety-tools.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Run end-to-end demo
        run: bash scripts/run_demo.sh
